services:
  postgres:
    image: postgres:17
    container_name: dpsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dpsm
      POSTGRES_USER: dpsm
      POSTGRES_PASSWORD: dpsm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  directus:
    image: directus/directus:latest
    container_name: dpsm-directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      SECRET: change-this-long-random-secret
      ADMIN_EMAIL: your-new-admin@work.com
      ADMIN_PASSWORD: change-this-password

      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dpsm
      DB_USER: dpsm
      DB_PASSWORD: dpsm
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      - postgres

volumes:
  postgres_data:
